# Codemagic CI/CD — builds the iOS app on Codemagic's macOS runners (no Mac
# needed). The Dart/Flutter code is cross-platform; this only handles the Apple
# side. Most of it works as-is — the parts you MUST set up are marked TODO.
#
# ── One-time setup at app.codemagic.io (needs an Apple Developer account, 99$/yr) ──
#   1. Add this GitHub repo as a Codemagic app.
#   2. Teams → Integrations → App Store Connect: add an App Store Connect API key
#      (App Store Connect → Users and Access → Integrations → generate a key).
#      Note the integration name and put it under `app_store_connect:` below.
#   3. Bundle id `app.dewdrop` must exist in your Apple Developer account
#      (Certificates, IDs & Profiles → Identifiers) with Push Notifications on.
#   4. Firebase: add an iOS app (bundle `app.dewdrop`) → download
#      GoogleService-Info.plist → either commit it to ios/Runner/ (it's a client
#      config, like google-services.json) or add it as a Codemagic secure file.
#   5. Push (APNs): in the Apple portal create an APNs Auth Key (.p8) → upload it
#      in Firebase → Project settings → Cloud Messaging → your iOS app.
#   6. Environment variables → group `dewdrop_cloud` with:
#        SUPABASE_URL          = https://jjbmtheuhiijwqdgcvgr.supabase.co
#        SUPABASE_ANON_KEY     = <publishable key>
#   7. TestFlight: create a beta group named "DewDrop testers" (or rename below).

workflows:
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: DewDrop ASC key   # TODO: your App Store Connect integration name (step 2)
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - dewdrop_cloud                     # TODO: SUPABASE_URL + SUPABASE_ANON_KEY (step 6)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.dewdrop
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - DewDrop testers                 # TODO: your TestFlight beta group (step 7)
